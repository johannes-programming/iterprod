[go.test_basic_product]
iterables = [
    [
        1,
        2,
    ],
    [
        "a",
        "b",
    ],
]
parallel = true
solution = [
    [
        1,
        "a",
    ],
    [
        1,
        "b",
    ],
    [
        2,
        "a",
    ],
    [
        2,
        "b",
    ],
]
valid = true

